# Trivy secret detection config
rules:
  - id: aws-access-key
    category: AWS
    title: AWS Access Key
    severity: CRITICAL
    regex: '(?i)aws_access_key_id\s*=\s*[''"]?[A-Z0-9]{20}[''"]?'

  - id: aws-secret-key
    category: AWS
    title: AWS Secret Access Key
    severity: CRITICAL
    regex: '(?i)aws_secret_access_key\s*=\s*[''"]?[A-Za-z0-9/+=]{40}[''"]?'

  - id: django-secret-key
    category: Django
    title: Django SECRET_KEY hardcoded
    severity: HIGH
    regex: 'SECRET_KEY\s*=\s*[''"][^''"\$\{]{20,}[''"]'

  - id: vault-token
    category: Vault
    title: HashiCorp Vault Token
    severity: CRITICAL
    regex: 'hvs\.[A-Za-z0-9_-]{90,}'

allow-rules:
  # Ignore dummy/example values in test files
  - id: ignore-test-secrets
    paths:
      - "*/tests/*"
      - "*/.env.example"
      - "*/conftest.py"
