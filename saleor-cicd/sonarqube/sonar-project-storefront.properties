sonar.projectKey=saleor-storefront
sonar.projectName=Saleor Storefront
sonar.projectVersion=0.1.0

sonar.sources=saleor-storefront/src
sonar.exclusions=\
  saleor-storefront/src/**/*.test.ts,\
  saleor-storefront/src/**/*.test.tsx,\
  saleor-storefront/.next/**,\
  saleor-storefront/node_modules/**

sonar.tests=saleor-storefront/src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx

sonar.typescript.lcov.reportPaths=saleor-storefront/coverage/lcov.info
sonar.javascript.lcov.reportPaths=saleor-storefront/coverage/lcov.info
