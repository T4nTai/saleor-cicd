sonar.projectKey=saleor-dashboard
sonar.projectName=Saleor Dashboard
sonar.projectVersion=3.23.3

sonar.sources=saleor-dashboard/src
sonar.exclusions=\
  saleor-dashboard/src/**/*.test.ts,\
  saleor-dashboard/src/**/*.test.tsx,\
  saleor-dashboard/src/**/__tests__/**,\
  saleor-dashboard/node_modules/**

sonar.tests=saleor-dashboard/src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx

sonar.typescript.lcov.reportPaths=saleor-dashboard/coverage/lcov.info
sonar.javascript.lcov.reportPaths=saleor-dashboard/coverage/lcov.info
